<!DOCTYPE html>
<html lang="th">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>เชื่อมบัญชี LINE — Personal Data Bank</title>
 <meta name="description" content="เชื่อม LINE bot กับบัญชี Personal Data Bank ของคุณ">
 <link rel="preconnect" href="https://fonts.googleapis.com">
 <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
 <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
 <link rel="stylesheet" href="/legacy/shared.css?v=8.0.0">
 <style>
  :root {
   --line-green: #06c755;
   --line-green-hover: #00b048;
  }
  body {
   background: var(--bg-primary);
   color: var(--text-primary);
   min-height: 100vh;
   display: flex;
   align-items: center;
   justify-content: center;
   padding: 20px;
   font-family: 'Inter', system-ui, sans-serif;
  }
  .auth-line-container {
   max-width: 420px;
   width: 100%;
   background: var(--bg-card);
   border: 1px solid var(--border);
   border-radius: 16px;
   padding: 32px 28px;
   box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }
  .auth-line-header {
   text-align: center;
   margin-bottom: 24px;
  }
  .auth-line-icon {
   display: inline-flex;
   align-items: center;
   justify-content: center;
   width: 64px;
   height: 64px;
   background: rgba(6, 199, 85, 0.12);
   border-radius: 50%;
   margin-bottom: 16px;
  }
  .auth-line-icon svg { color: var(--line-green); }
  .auth-line-title {
   font-size: 22px;
   font-weight: 600;
   margin: 0 0 8px 0;
   color: var(--text-primary);
  }
  .auth-line-subtitle {
   font-size: 14px;
   color: var(--text-secondary);
   line-height: 1.5;
   margin: 0;
  }
  .auth-line-state {
   margin-top: 20px;
   padding: 16px;
   background: rgba(255,255,255,0.03);
   border-radius: 12px;
   text-align: center;
   font-size: 13px;
   color: var(--text-secondary);
  }
  .auth-line-state.error {
   background: rgba(239, 68, 68, 0.08);
   border: 1px solid rgba(239, 68, 68, 0.18);
   color: #fca5a5;
  }
  .auth-line-state.success {
   background: rgba(6, 199, 85, 0.08);
   border: 1px solid rgba(6, 199, 85, 0.2);
   color: #06c755;
  }
  .auth-line-actions {
   margin-top: 20px;
   display: flex;
   flex-direction: column;
   gap: 10px;
  }
  .auth-line-link {
   display: block;
   text-align: center;
   margin-top: 12px;
   font-size: 13px;
   color: var(--text-secondary);
   text-decoration: none;
  }
  .auth-line-link:hover { color: var(--accent); }
  .auth-line-spinner {
   display: inline-block;
   width: 18px;
   height: 18px;
   border: 2px solid rgba(255,255,255,0.2);
   border-top-color: var(--line-green);
   border-radius: 50%;
   animation: spin 0.8s linear infinite;
   vertical-align: middle;
   margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .auth-line-footer {
   margin-top: 24px;
   padding-top: 20px;
   border-top: 1px solid var(--border);
   text-align: center;
   font-size: 11.5px;
   color: var(--text-muted);
   line-height: 1.6;
  }
 </style>
</head>
<body>
 <div class="auth-line-container">
  <div class="auth-line-header">
   <div class="auth-line-icon">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
     <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
    </svg>
   </div>
   <h1 class="auth-line-title" id="auth-line-title">เชื่อมบัญชี LINE</h1>
   <p class="auth-line-subtitle" id="auth-line-subtitle">
    เชื่อม LINE Bot ของคุณกับบัญชี Personal Data Bank<br>
    เพื่อใช้ข้อมูลทุกที่ผ่าน LINE
   </p>
  </div>

  <div class="auth-line-state" id="auth-line-state">
   <span class="auth-line-spinner"></span>
   <span id="auth-line-state-text">กำลังตรวจสอบสถานะ...</span>
  </div>

  <div class="auth-line-actions" id="auth-line-actions" style="display:none">
   <button class="btn btn-primary btn-block" id="btn-confirm-link">ยืนยันการเชื่อมบัญชี</button>
   <button class="btn btn-outline btn-block" id="btn-login-first" style="display:none">เข้าสู่ระบบก่อน</button>
   <a href="/" class="auth-line-link" id="link-cancel">ยกเลิก</a>
  </div>

  <div class="auth-line-footer">
   ลิงก์เชื่อมบัญชีหมดอายุภายใน 10 นาที<br>
   หากเกิดปัญหา ลองเริ่มใหม่จาก LINE bot
  </div>
 </div>

 <script src="/legacy/auth-line.js?v=8.0.0"></script>
</body>
</html>
