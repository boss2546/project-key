app = "personaldatabank"
primary_region = "sin"

[build]

[env]
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

# v10.0.8 — keep VM warm + reject traffic until Uvicorn is ready.
# Fixes "instance refused connection" 502s during cold start (proxy was
# forwarding requests before app bind). With this probe, Fly waits for
# /health to respond 200 before routing real traffic.
[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "get"
  timeout = "5s"
  path = "/health"

[[vm]]
  memory = "2048mb"
  cpu_kind = "shared"
  cpus = 2

[mounts]
  source = "project_key_data"
  destination = "/app/data"
